# =============================================================================
#  configs/ddppo_palr_fetch.yaml
#
#  PALR agent: DD-PPO + ResNet-18 backbone + per-block LR scaling
#              + targeted dead-filter perturbation.
#
#  Fetch Continual Curriculum (4 phases, cyclic):
#    Phase 0 — RearrangePick  (target: apple)
#    Phase 1 — RearrangePick  (target: bowl)
#    Phase 2 — RearrangeOpen  (target: fridge door)
#    Phase 3 — RearrangePlace (target: sink receptacle)
# =============================================================================

BASE_TASK_CONFIG_PATH: "configs/rearrange_base.yaml"

TRAINER_NAME: "ddppo"
ENV_NAME: "RearrangePickTask-v0"     # overridden per phase by curriculum

NUM_ENVIRONMENTS: 16          # per GPU (×4 GPUs = 64 total parallel envs)
TOTAL_NUM_STEPS: 2.0e8        # 200 M env steps across all 4 phases
NUM_UPDATES: -1               # use TOTAL_NUM_STEPS instead

CHECKPOINT_FOLDER: "results/checkpoints"
TENSORBOARD_DIR:   "results/tb"
LOG_FILE:          "results/train.log"
LOG_INTERVAL:      10
CHECKPOINT_INTERVAL: 500

VIDEO_OPTION: []       # disable video during training (saves memory)

RL:
  SUCCESS_REWARD: 10.0
  SLACK_REWARD: -0.001

  PPO:
    clip_param:      0.2
    ppo_epoch:       2
    num_mini_batch:  2         # per GPU; effective batch = 16envs × 64steps × 4GPUs
    value_loss_coef: 0.5
    entropy_coef:    0.01
    lr:              2.5e-4
    eps:             1.0e-5
    max_grad_norm:   0.2
    use_linear_lr_decay:   true
    use_linear_clip_decay: true

  DDPPO:
    sync_frac:             0.6
    distrib_backend:       "NCCL"
    rnn_type:              "GRU"
    num_recurrent_layers:  1
    backbone:              "resnet18"      # our custom PALRResNetEncoder
    pretrained_weights:    ""             # train from scratch
    pretrained:            false
    reset_critic:          false
    force_distributed:     true

  ROLLOUT_STORAGE:
    num_steps: 64

# --------------------------------------------------------------------------- #
# PALR-specific hyper-parameters
# --------------------------------------------------------------------------- #
PALR:
  enabled:           true

  # Plasticity measurement
  measure_freq:      200          # updates between plasticity checks
  diag_batch_size:   256          # observations drawn from rollout buffer

  # LR scaling per ResNet block (blocks 0-3 = layer1-4)
  beta:              3.0          # dead-fraction sensitivity
  rank_beta:         1.5          # rank-deficit sensitivity
  max_lr_scale:      5.0          # clip LR scale to [1, max_lr_scale]

  # Dead-filter perturbation
  perturb_threshold: 0.10         # perturb when dead fraction > 10 %
  perturb_sigma:     0.3          # noise = He-std × perturb_sigma

  # Ideal baselines for deficit computation
  baseline_dead:     0.0          # target: no dead filters
  baseline_erank:    [48.0, 96.0, 192.0, 384.0]  # ≈ 75% of channel count
                                  # layer1=64ch, layer2=128ch, layer3=256ch, layer4=512ch

# --------------------------------------------------------------------------- #
# Continual curriculum (phases cycle: 0→1→2→3→0→…)
# --------------------------------------------------------------------------- #
CURRICULUM:
  steps_per_phase:   50000000     # 50 M env steps per task phase
  phases:
    - task:          "RearrangePickTask-v0"
      label:         "apple_pick"
      dataset:       "data/datasets/replica_cad/v2/train/rearrange.json.gz"
    - task:          "RearrangePickTask-v0"
      label:         "bowl_pick"
      dataset:       "data/datasets/replica_cad/v2/train/rearrange_easy.json.gz"
    - task:          "RearrangeOpenFridgeTask-v0"
      label:         "open_fridge"
      dataset:       "data/datasets/replica_cad/v2/train/in_fridge_1k_100.json.gz"
    - task:          "RearrangePlaceTask-v0"
      label:         "sink_place"
      dataset:       "data/datasets/replica_cad/v2/train/all_receptacles_10k_1k.json.gz"

# --------------------------------------------------------------------------- #
# Observations used by the policy
# --------------------------------------------------------------------------- #
TASK_CONFIG:
  TASK:
    MEASUREMENTS:
      - "REARRANGE_PICK_REWARD"
      - "REARRANGE_PICK_SUCCESS"
      - "NUM_STEPS"
    SENSORS:
      - "JOINT_SENSOR"
      - "IS_HOLDING_SENSOR"
      - "TARGET_START_GPS_COMPASS_SENSOR"
      - "TARGET_GOAL_GPS_COMPASS_SENSOR"
  SIMULATOR:
    AGENT_0:
      SENSORS: ["HEAD_RGB_SENSOR", "HEAD_DEPTH_SENSOR"]
    HEAD_RGB_SENSOR:
      WIDTH:  128
      HEIGHT: 128
    HEAD_DEPTH_SENSOR:
      WIDTH:  128
      HEIGHT: 128

# Keys to look up per-episode success in habitat info dict.
# Names depend on which RearrangeTask measurement is registered.
# The trainer will use the first matching key it finds.
SUCCESS_MEASURE_KEYS:
  - "rearrange_pick_success"
  - "rearrange_place_success"
  - "rearrange_open_fridge_success"
  - "success"
